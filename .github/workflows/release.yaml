name: Release uv-monorepo-dependency-plugin

on:
    workflow_dispatch:
        inputs:
            releaseVersion:
                description: "Release version"
                required: true
            developmentVersion:
                description: "Next development version"
                required: true

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                ref: dev

            - name: Create release branch
              run: |
                  git checkout -b release-${{ github.event.inputs.releaseVersion }}
                  git push origin release-${{ github.event.inputs.releaseVersion }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install Python # use direct install rather than pyenv for CI for large speed improvement
              uses: actions/setup-python@v5
              with:
                python-version: '3.12.9'

            - name: Install uv
              uses: astral-sh/setup-uv@v5
              with:
                # Install a specific version of uv.
                version: "0.6.10"

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'
                  cache: maven

            - name: Release uv-monorepo-dependency-tool
              run: mvn -B release:prepare release:perform --file pom.xml -DreleaseVersion=${{ github.event.inputs.releaseVersion }} -DdevelopmentVersion=${{ github.event.inputs.developmentVersion }}
              env:
                MAVEN_USERNAME: ${{ secrets.SONATYPE_CENTRAL_REPO_TOKEN_USER }}
                MAVEN_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_REPO_TOKEN_KEY }}
                GPG_PASSPHRASE: ${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Update dev branch
              run: |
                git checkout dev
                git merge --ff-only release-${{ github.event.inputs.releaseVersion }}
                git push origin dev
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}